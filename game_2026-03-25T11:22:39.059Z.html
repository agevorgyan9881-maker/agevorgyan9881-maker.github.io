<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Wheel Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f7f7f7;
            font-family: Arial, sans-serif;
        }
        #wheel {
            border: 16px solid #e89e0b;
            border-radius: 50%;
            width: 300px;
            height: 300px;
            position: relative;
            overflow: hidden;
            animation: spin 4s ease-out forwards;
        }
        .sector {
            width: 50%;
            height: 50%;
            position: absolute;
            clip-path: polygon(100% 0, 0 100%, 100% 100%);
            transform-origin: 100% 100%;
            font-size: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        #spinButton {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
        }
        @keyframes spin {
            to {
                transform: rotate(1440deg);
            }
        }
    </style>
</head>
<body>
    <div>
        <div id="wheel">
            <div class="sector" style="transform:rotate(0deg); background-color: #e74c3c;">$10</div>
            <div class="sector" style="transform:rotate(45deg); background-color: #f39c12;">$20</div>
            <div class="sector" style="transform:rotate(90deg); background-color: #2ecc71;">$30</div>
            <div class="sector" style="transform:rotate(135deg); background-color: #3498db;">$40</div>
            <div class="sector" style="transform:rotate(180deg); background-color: #9b59b6;">$50</div>
            <div class="sector" style="transform:rotate(225deg); background-color: #8e44ad;">$60</div>
            <div class="sector" style="transform:rotate(270deg); background-color: #16a085;">$70</div>
            <div class="sector" style="transform:rotate(315deg); background-color: #e67e22;">$80</div>
        </div>
        <button id="spinButton">Spin</button>
    </div>
    <script>
        const button = document.getElementById('spinButton');
        const wheel = document.getElementById('wheel');

        button.addEventListener('click', () => {
            const randomDeg = Math.floor(Math.random() * 360);
            const spinValue = 1440 + randomDeg;
            wheel.style.transition = 'transform 4s ease-out';
            wheel.style.transform = `rotate(${spinValue}deg)`;
        });
    </script>
</body>
</html>
