<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette - Spin to Win!</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        body {
            background-color: #1a1a1a;
            color: #f8f8f8;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            margin: 20px 0;
            font-size: 2em;
            text-align: center;
        }
        .wheel {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            border: 10px solid gold;
            background: linear-gradient(#006400, #004d00);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            transition: transform 4s ease-out;
        }
        .ball {
            position: absolute;
            height: 30px;
            width: 30px;
            border-radius: 50%;
            background-color: white;
            transition: transform 4s ease-out;
        }
        .button {
            background-color: gold;
            border: none;
            border-radius: 5px;
            padding: 15px 30px;
            font-size: 1.2em;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.3s;
        }
        .button:hover {
            background-color: #ffd700;
        }
        .winner-popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 1000;
        }
        .winner-popup h2 {
            color: gold;
            margin: 20px;
        }
        .confetti {
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 999;
        }
    </style>
</head>
<body>

    <h1>Spin the Roulette Wheel!</h1>
    <div class="wheel" id="rouletteWheel">
        <div class="ball" id="rouletteBall"></div>
    </div>
    <button class="button" id="spinButton">Spin</button>

    <div class="winner-popup" id="winnerPopup">
        <h2>You Win!</h2>
        <button class="button" onclick="closePopup()">Close</button>
    </div>
    <div class="confetti" id="confetti"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/canvas-confetti/1.4.0/confetti.min.js"></script>
    <script>
        const wheel = document.getElementById('rouletteWheel');
        const ball = document.getElementById('rouletteBall');
        const spinButton = document.getElementById('spinButton');
        const winnerPopup = document.getElementById('winnerPopup');

        spinButton.addEventListener('click', () => {
            const spinSound = new Audio('https://www.soundjay.com/button/sounds/button-3.mp3');
            spinSound.play();
            const randomDegree = Math.random() * 360 + 720; // At least two full spins
            wheel.style.transform = `rotate(${randomDegree}deg)`;
            ball.style.transform = `translateY(-150px)`;
            setTimeout(() => {
                showWinnerPopup();
                ball.style.transform = '';
            }, 4000); // match the total spin duration
        });

        function showWinnerPopup() {
            winnerPopup.style.display = 'flex';
            confetti();
        }

        function closePopup() {
            winnerPopup.style.display = 'none';
        }
    </script>
</body>
</html>
