<!DOCTYPE html>
<html>
<head>
  <title>Playable Ad Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      background: #111827;
      font-family: Arial, sans-serif;
      text-align: center;
      color: white;
      overflow: hidden;
    }

    h1 {
      margin-top: 40px;
      font-size: 28px;
    }

    #game {
      margin-top: 40px;
      font-size: 24px;
    }

    #coin {
      font-size: 60px;
      cursor: pointer;
      transition: transform 0.1s;
    }

    #coin:active {
      transform: scale(0.9);
    }

    #score {
      margin-top: 20px;
      font-size: 22px;
    }

    #cta {
      display: none;
      margin-top: 30px;
      padding: 15px 30px;
      background: #22c55e;
      color: black;
      font-weight: bold;
      border-radius: 8px;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <h1>🎮 Tap The Coin!</h1>

  <div id="game">
    <div id="coin">🪙</div>
    <div id="score">Score: 0</div>
  </div>

  <a id="cta" href="https://play.google.com" target="_blank">
    Install Now
  </a>

  <script>
    let score = 0;
    const coin = document.getElementById("coin");
    const scoreText = document.getElementById("score");
    const cta = document.getElementById("cta");

    coin.addEventListener("click", function() {
      score++;
      scoreText.innerText = "Score: " + score;

      if (score >= 10) {
        cta.style.display = "inline-block";
      }
    });
  </script>

</body>
</html>
