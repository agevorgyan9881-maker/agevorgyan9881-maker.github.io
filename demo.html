<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Wheel Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        
        .wheel-wrapper {
            position: relative;
            width: 400px;
            height: 400px;
            margin: 0 auto 30px;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.4));
        }
        
        .character-image {
            position: absolute;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 5px solid gold;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover;
            background: white;
        }
        
        .spin-button {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.3em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .spin-button:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.6);
        }
        
        .spin-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .result {
            margin-top: 30px;
            color: white;
            font-size: 1.5em;
            min-height: 30px;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .wheel-wrapper {
                width: 300px;
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎡 Lucky Wheel</h1>
        
        <div class="wheel-wrapper">
            <canvas id="wheelCanvas"></canvas>
            <img id="characterImage" class="character-image" src="" alt="Character">
        </div>
        
        <button class="spin-button" id="spinButton">SPIN THE WHEEL</button>
        
        <div class="result" id="result"></div>
    </div>

    <script>
        let wheelData = {
            segments: [
                { label: '100 ARS', color: '#FF6B6B' },
                { label: '500 ARS', color: '#4ECDC4' },
                { label: '1000 ARS', color: '#45B7D1' },
                { label: '50 ARS', color: '#FFA07A' },
                { label: '200 ARS', color: '#98D8C8' },
                { label: 'JACKPOT', color: '#F7DC6F' },
                { label: '1500 ARS', color: '#BB8FCE' },
                { label: '250 ARS', color: '#85C1E2' }
            ],
            characterImage: 'https://via.placeholder.com/120?text=Your+Photo',
            isSpinning: false
        };

        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const spinButton = document.getElementById('spinButton');
        const resultDiv = document.getElementById('result');
        const characterImg = document.getElementById('characterImage');

        function resizeCanvas() {
            const size = Math.min(canvas.offsetWidth, canvas.offsetHeight);
            canvas.width = size;
            canvas.height = size;
            drawWheel();
        }

        function drawWheel() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = Math.min(centerX, centerY) - 20;
            const sliceAngle = (Math.PI * 2) / wheelData.segments.length;

            wheelData.segments.forEach((segment, index) => {
                const angle = sliceAngle * index + wheelRotation;

                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, angle, angle + sliceAngle);
                ctx.lineTo(centerX, centerY);
                ctx.fillStyle = segment.color;
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 3;
                ctx.stroke();

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(angle + sliceAngle / 2);
                ctx.textAlign = 'right';
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 16px Arial';
                ctx.fillText(segment.label, radius - 30, 5);
                ctx.restore();
            });

            ctx.beginPath();
            ctx.arc(centerX, centerY, 60, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.strokeStyle = '#f5576c';
            ctx.lineWidth = 4;
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(centerX, 0);
            ctx.lineTo(centerX - 15, 30);
            ctx.lineTo(centerX + 15, 30);
            ctx.fillStyle = '#f5576c';
            ctx.fill();
        }

        let wheelRotation = 0;
        let wheelVelocity = 0;

        function spinWheel() {
            if (wheelData.isSpinning) return;
            
            wheelData.isSpinning = true;
            spinButton.disabled = true;
            resultDiv.textContent = '';

            wheelVelocity = Math.random() * 0.2 + 0.15;

            const animation = () => {
                wheelRotation += wheelVelocity;
                wheelVelocity *= 0.98;

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.save();
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.rotate(wheelRotation);
                ctx.translate(-canvas.width / 2, -canvas.height / 2);
                
                drawWheel();
                
                ctx.restore();

                if (wheelVelocity > 0.01) {
                    requestAnimationFrame(animation);
                } else {
                    const finalAngle = wheelRotation % (Math.PI * 2);
                    const sliceAngle = (Math.PI * 2) / wheelData.segments.length;
                    const winningIndex = Math.floor((Math.PI * 2 - finalAngle) / sliceAngle) % wheelData.segments.length;
                    const winner = wheelData.segments[winningIndex];

                    resultDiv.textContent = `🎉 You won: ${winner.label}!`;
                    wheelData.isSpinning = false;
                    spinButton.disabled = false;
                }
            };

            animation();
        }

        function loadFromURL() {
            const params = new URLSearchParams(window.location.search);
            
            if (params.has('image')) {
                characterImg.src = params.get('image');
                wheelData.characterImage = params.get('image');
            }

            if (params.has('segments')) {
                try {
                    const segments = JSON.parse(decodeURIComponent(params.get('segments')));
                    wheelData.segments = segments;
                } catch (e) {
                    console.error('Invalid segments data');
                }
            }
        }

        spinButton.addEventListener('click', spinWheel);
        window.addEventListener('resize', resizeCanvas);

        loadFromURL();
        resizeCanvas();
    </script>
</body>
</html>
