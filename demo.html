<!DOCTYPE html>
<html>
<head>
    <title>Dynamic Game</title>
    <style>body { background: #000; color: #fff; text-align: center; }</style>
</head>
<body>
    <h1>Ձեր խաղը</h1>
    <img id="gameImg" src="" style="width:300px; border: 5px solid gold;">
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('gameImg').src = urlParams.get('image');
    </script>
</body>
</html>
