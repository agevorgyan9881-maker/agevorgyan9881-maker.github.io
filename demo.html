<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VERDE CASINO 🎃 Magic Halloween</title>
  <style>
    body {
      margin: 0; padding: 0;
      font-family: 'Arial Black', 'Segoe UI', sans-serif;
      background: linear-gradient(to bottom, #0a1f0a, #001a00, #0d001a);
      color: #fff; min-height: 100vh; overflow: hidden; position: relative; text-align: center;
    }
    
    .overlay { 
      position: absolute; top: 0; left: 0; right: 0; bottom: 0; 
      background: url('https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&q=80') center/cover no-repeat; 
      opacity: 0.1; z-index: 1; 
    }

    /* --- ԽՈՇՈՐ ՍՊԻՏԱԿ ԿԵՏԻԿՆԵՐ --- */
    .particles-container {
      position: absolute; width: 100%; height: 100%;
      top: 0; left: 0; pointer-events: none; z-index: 2;
    }
    .dot {
      position: absolute; background: rgba(255, 255, 255, 0.8); /* Ավելի վառ սպիտակ */
      border-radius: 50%; bottom: -20px;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.5); /* Թեթև փայլ */
      animation: rise 6s infinite linear;
    }
    @keyframes rise {
      0% { transform: translateY(0) scale(1); opacity: 0; }
      15% { opacity: 1; }
      100% { transform: translateY(-110vh) scale(0.4); opacity: 0; }
    }

    /* --- ԴԴՈՒՄՆԵՐԸ ԼՈԳՈՅԻ ՀԱՎԱՍԱՐ (ԲԱՐՁՐ) --- */
    .pumpkin {
      position: absolute; font-size: 140px; z-index: 4;
      filter: drop-shadow(0 0 30px orange);
      animation: pumpkinGlow 4s infinite alternate ease-in-out;
      pointer-events: none;
    }
    /* Դիրքը բարձրացրել եմ հենց լոգոյի մակարդակին (top: 40px) */
    .p-left { top: 40px; left: 20px; transform: rotate(15deg); }
    .p-right { top: 40px; right: 20px; transform: rotate(-15deg); }
    
    @keyframes pumpkinGlow {
      from { filter: drop-shadow(0 0 20px #ff8800); transform: translateY(0) rotate(15deg); }
      to { filter: drop-shadow(0 0 50px #ff4400); transform: translateY(10px) rotate(10deg); }
    }
    .p-right { animation-name: pumpkinGlowRight; }
    @keyframes pumpkinGlowRight {
      from { filter: drop-shadow(0 0 20px #ff8800); transform: translateY(0) rotate(-15deg); }
      to { filter: drop-shadow(0 0 50px #ff4400); transform: translateY(10px) rotate(-10deg); }
    }

    .content { position: relative; z-index: 5; padding: 40px 20px; max-width: 1200px; margin: 0 auto; }
    .logo { font-size: 4rem; color: #00ff00; text-shadow: 0 0 25px #00ff00; margin-bottom: 0.2em; }
    h1 { font-size: 2.5rem; margin: 0.2em 0; text-shadow: 0 0 30px #ffff00; }
    h2 { font-size: 1.8rem; color: #ffff00; margin-bottom: 1em; }

    .cauldrons { display: flex; justify-content: center; gap: 40px; margin: 3.5em 0; flex-wrap: wrap; }
    
    .cauldron {
      width: 200px; height: 165px;
      background: linear-gradient(180deg, #1a3a1a, #051005);
      border-radius: 40% 40% 50% 50% / 20% 20% 80% 80%;
      position: relative; border: 2px solid rgba(0,255,100,0.3);
      box-shadow: 0 10px 40px #000;
      animation: float 6s infinite ease-in-out;
    }

    .cauldron::before {
      content: ""; position: absolute; top: -10px; left: 5%;
      width: 90%; height: 35px; background: linear-gradient(#00ff4c, #008822);
      border-radius: 50%; box-shadow: 0 0 30px #00ff4c; z-index: 2;
    }

    .cauldron::after {
      content: "★"; position: absolute; top: 55%; left: 50%;
      transform: translate(-50%, -50%); font-size: 40px; color: #bfff00;
      text-shadow: 0 0 20px #bfff00;
    }

    .label {
      position: absolute; bottom: -55px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.9); padding: 10px 18px; border-radius: 12px;
      font-size: 1.1rem; color: #00ffaa; border: 1px solid #00ff00; white-space: nowrap;
    }

    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

    .btn {
      display: inline-block; background: linear-gradient(45deg, #ff00aa, #aa00ff);
      color: white; font-size: 1.8rem; padding: 20px 60px; border-radius: 60px;
      text-decoration: none; margin-top: 1.5em; box-shadow: 0 10px 40px rgba(170,0,255,0.7);
      transition: 0.3s; font-weight: bold;
    }
    .btn:hover { transform: scale(1.1); box-shadow: 0 0 50px #ff00aa; }
  </style>
</head>
<body>

  <div class="overlay"></div>
  <div class="particles-container" id="particles"></div>

  <div class="pumpkin p-left">🎃</div>
  <div class="pumpkin p-right">🎃</div>

  <div class="content">
    <div class="logo">VERDE CASINO</div>
    <h1>IT'S TIME FOR SOME MAGIC</h1>
    <h2>TRY TO GET AMAZING BONUSES</h2>

    <div class="cauldrons">
      <div class="cauldron">
        <div class="label">135% + 40 FS</div>
      </div>
      <div class="cauldron" style="animation-delay: 1s;">
        <div class="label">200 Free Spins</div>
      </div>
      <div class="cauldron" style="animation-delay: 2s;">
        <div class="label">Mystery Bonus</div>
      </div>
    </div>

    <a href="https://verde.casino/" class="btn" target="_blank">ПРИСОЕДИНЯЙСЯ СЕЙЧАС!</a>
  </div>

  <script>
    // Կետիկները սարքել եմ ավելի մեծ (Math.random() * 6 + 3)
    const container = document.getElementById('particles');
    for (let i = 0; i < 90; i++) {
      const dot = document.createElement('div');
      dot.className = 'dot';
      const size = Math.random() * 6 + 3 + 'px'; // Ավելի մեծ չափսեր
      dot.style.width = size;
      dot.style.height = size;
      dot.style.left = Math.random() * 100 + '%';
      dot.style.animationDuration = Math.random() * 5 + 4 + 's';
      dot.style.animationDelay = Math.random() * 10 + 's';
      container.appendChild(dot);
    }
  </script>

</body>
</html>
