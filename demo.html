<!DOCTYPE html>
<html lang="hy">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VERDE CASINO 🎃 It's Time for Some Magic</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Arial Black', 'Segoe UI', sans-serif;
      background: linear-gradient(to bottom, #0a1f0a, #001a00, #0d001a);
      color: #fff;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
      text-align: center;
    }
    .overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: url('https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&q=80') center/cover no-repeat; /* կարող ես փոխել ավելի spooky անտառի URL-ով */
      opacity: 0.4;
      z-index: 1;
    }
    .content {
      position: relative;
      z-index: 3;
      padding: 40px 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .logo {
      font-size: 5rem;
      color: #00ff00;
      text-shadow: 0 0 20px #00ff00, 0 0 40px #008800;
      margin: 0.5em 0;
      animation: glowGreen 4s infinite alternate;
    }
    h1 {
      font-size: 4rem;
      margin: 0.3em 0;
      text-shadow: 0 0 30px #ffff00, 0 0 60px #ff8800;
    }
    h2 {
      font-size: 3rem;
      color: #ffff00;
      text-shadow: 0 0 20px #ffff00;
      margin: 0.5em 0;
    }
    .cauldrons {
      display: flex;
      justify-content: center;
      gap: 60px;
      margin: 3em 0;
      flex-wrap: wrap;
    }
    .cauldron {
      width: 220px;
      position: relative;
      animation: float 6s infinite ease-in-out;
    }
    .cauldron::before {
      content: "🪄";
      font-size: 12rem;
      display: block;
      filter: drop-shadow(0 0 30px #00ff00);
    }
    .cauldron .glow {
      position: absolute;
      top: 40%; left: 50%;
      transform: translate(-50%, -50%);
      width: 140px; height: 140px;
      background: radial-gradient(circle, #00ff88 20%, transparent 70%);
      border-radius: 50%;
      opacity: 0.7;
      animation: bubble 3s infinite;
    }
    .cauldron .label {
      position: absolute;
      bottom: -40px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 1.4rem;
      color: #00ffaa;
      border: 2px solid #00ff00;
      box-shadow: 0 0 15px #00ff00;
    }
    .btn {
      display: inline-block;
      background: linear-gradient(45deg, #ff00aa, #aa00ff, #00ffaa);
      color: white;
      font-size: 2.2rem;
      padding: 20px 80px;
      border-radius: 60px;
      text-decoration: none;
      margin: 3em 0 1em;
      box-shadow: 0 15px 40px rgba(0,255,170,0.7);
      transition: all 0.4s;
    }
    .btn:hover {
      transform: scale(1.1) rotate(2deg);
      box-shadow: 0 25px 60px rgba(0,255,0,0.9);
    }
    .bats {
      position: absolute;
      font-size: 6rem;
      opacity: 0.6;
      z-index: 2;
      animation: fly 20s infinite linear;
    }
    .bat1 { top: 10%; left: 10%; }
    .bat2 { top: 20%; right: 15%; animation-delay: 5s; }
    .pumpkin {
      position: absolute;
      font-size: 8rem;
      opacity: 0.5;
      z-index: 2;
      animation: glow 5s infinite alternate;
    }
    .pumpkin1 { bottom: 15%; left: 8%; }
    .pumpkin2 { bottom: 25%; right: 10%; }

    @keyframes glowGreen { from { text-shadow: 0 0 10px #00ff00; } to { text-shadow: 0 0 40px #00ff88, 0 0 80px #008800; } }
    @keyframes glow { from { text-shadow: 0 0 10px #ffff00; } to { text-shadow: 0 0 40px #ffff88; } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-30px); } }
    @keyframes bubble { 0% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.3); opacity: 0.4; } 100% { transform: scale(1); opacity: 0.7; } }
    @keyframes fly { 0% { transform: translate(0,0) rotate(0deg); } 100% { transform: translate(200vw, -100vh) rotate(720deg); } }

    .lang { position: absolute; top: 20px; right: 20px; font-size: 1.5rem; color: #ccc; }
    .lang select { background: #000; color: #0f0; border: 1px solid #0f0; padding: 8px; }
  </style>
</head>
<body>

  <div class="overlay"></div>

  <div class="lang">
    <select>
      <option>EN</option>
      <option>Հայերեն</option>
      <option>Русский</option>
    </select>
  </div>

  <div class="content">
    <div class="logo">VERDE CASINO</div>
    <h1>IT'S TIME FOR SOME MAGIC</h1>
    <h2>TRY TO GET AMAZING BONUSES</h2>

    <div class="cauldrons">
      <div class="cauldron">
        <div class="glow"></div>
        <div class="label">135% + 40 FS</div>
      </div>
      <div class="cauldron" style="animation-delay:1s;">
        <div class="glow"></div>
        <div class="label">200 Free Spins</div>
      </div>
      <div class="cauldron" style="animation-delay:2s;">
        <div class="glow"></div>
        <div class="label">Mystery Bonus</div>
      </div>
    </div>

    <a href="https://verde.casino/?ref=ka8as_nwujnic_sa8qes" class="btn" target="_blank">
      ՄԻԱՑԻՐ ՀԻՄԱ & ՍՏԱՑԻՐ ԲՈՆՈՒՍՆԵՐ!
    </a>

    <p style="font-size:1.3rem; opacity:0.9; margin-top:2em;">
      18+ | Խաղա պատասխանատու | Curacao Licensed
    </p>
  </div>

  <div class="bats bat1">🦇</div>
  <div class="bats bat2">🦇</div>
  <div class="pumpkin pumpkin1">🎃</div>
  <div class="pumpkin pumpkin2">🎃</div>

</body>
</html>
