<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette - Spin to Win!</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            overflow: hidden;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 5px #000000;
        }
        .roulette-wheel {
            width: 300px;
            height: 300px;
            border: 16px solid gold;
            border-radius: 50%;
            background: radial-gradient(circle, #007A33 0%, #005f25 100%);
            position: relative;
            animation: spinAnimation 10s infinite linear;
        }
        @keyframes spinAnimation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .spin-button {
            background: linear-gradient(90deg, #ffcc00, #ffd700);
            border: none;
            border-radius: 10px;
            padding: 15px 30px;
            font-size: 1.5em;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 20px;
        }
        .spin-button:hover {
            background: linear-gradient(90deg, #ffd700, #ffcc00);
        }
        .winner-popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.8);
            border: 2px solid gold;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            z-index: 1000;
        }
        .winner-popup h2 {
            color: gold;
        }
        .confetti {
            width: 100%;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Spin the Roulette!</h1>
        <div class="roulette-wheel" id="rouletteWheel"></div>
        <button class="spin-button" id="spinButton">SPIN</button>
        <div class="winner-popup" id="winnerPopup">
            <h2>You Win!</h2>
            <button onclick="closePopup()">Close</button>
        </div>
        <canvas class="confetti" id="confettiCanvas"></canvas>
    </div>

    <script src="https://cdn.rawgit.com/mathusummut/confetti.js/master/confetti.js"></script>
    <script>
        const spinButton = document.getElementById('spinButton');
        const rouletteWheel = document.getElementById('rouletteWheel');
        const winnerPopup = document.getElementById('winnerPopup');

        spinButton.addEventListener('click', function() {
            let spinDuration = 4000;
            playSpinSound();
            rouletteWheel.style.animation = `spinAnimation ${spinDuration}ms ease-in-out`;
            setTimeout(showWinnerPopup, spinDuration);
        });

        function playSpinSound() {
            const clickSound = new Audio('https://www.soundjay.com/button/sounds/button-16.mp3');
            clickSound.play();
        }

        function showWinnerPopup() {
            rouletteWheel.style.animation = '';
            winnerPopup.style.display = 'block';
            confetti.start();
        }

        function closePopup() {
            winnerPopup.style.display = 'none';
            confetti.stop();
        }
    </script>
</body>
</html>
