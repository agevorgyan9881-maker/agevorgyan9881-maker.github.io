<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Roulette</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: gold;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        #roulette {
            position: relative;
            width: 500px;
            height: 500px;
            margin: 50px auto;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #wheel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transform: rotate(0deg);
            transition: transform 4s cubic-bezier(0.33, 1, 0.68, 1);
        }
        #bettingTable {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
        .chip {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 10px;
            background: green;
            color: white;
            font-weight: bold;
            transition: transform 0.1s;
        }
        .chip:hover {
            transform: scale(1.1);
        }
        #spinButton {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            background-color: gold;
            color: #1a1a1a;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            transition: background-color 0.3s;
        }
        #spinButton:hover {
            background-color: darkgoldenrod;
        }
        #balance {
            text-align: center;
            margin-top: 20px;
            font-size: 24px;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>
    <div id="balance">Bank Balance: $1000</div>
    <div id="roulette">
        <canvas id="wheel" width="500" height="500"></canvas>
    </div>
    <div id="bettingTable">
        <div class="chip" data-value="10">10</div>
        <div class="chip" data-value="25">25</div>
        <div class="chip" data-value="50">50</div>
        <div class="chip" data-value="100">100</div>
    </div>
    <button id="spinButton">Spin</button>
    
    <script>
        const wheelElement = document.getElementById('wheel');
        const ctx = wheelElement.getContext('2d');
        const chips = document.querySelectorAll('.chip');
        let balance = 1000;
        let totalBet = 0;
        let winNumber = -1;

        function drawWheel() {
            const colors = ['#ff0000', '#000000'];
            const numbers = Array.from({length: 37}, (_, i) => i === 0 ? 0 : i);
            const angle = (2 * Math.PI) / numbers.length;
            
            numbers.forEach((number, i) => {
                const startAngle = i * angle;
                const endAngle = (i + 1) * angle;
                ctx.beginPath();
                ctx.moveTo(250, 250);
                ctx.arc(250, 250, 250, startAngle, endAngle);
                ctx.fillStyle = colors[i % 2];
                ctx.fill();
                
                ctx.save();
                ctx.translate(250, 250);
                ctx.rotate((startAngle + endAngle) / 2);
                ctx.fillStyle = 'white';
                ctx.fillText(number, 120, 10);
                ctx.restore();
            });
        }

        function spinWheel() {
            const randomDegree = Math.floor(Math.random() * 360 + 720); // spins at least 720 degrees
            wheelElement.style.transform = `rotate(${randomDegree}deg)`;
            winNumber = Math.floor((randomDegree % 360) / 10); // simplified winning logic
            setTimeout(checkWinLoss, 4000); // Match spin duration
        }

        function checkWinLoss() {
            const resultText = winNumber === 0 ? "You lost!" : `You won ${totalBet * 2}!`; // simple win logic
            alert(resultText);
            balance += winNumber === 0 ? -totalBet : totalBet * 2;
            document.getElementById('balance').innerText = `Bank Balance: $${balance}`;
            totalBet = 0; // Reset total bet after spin
        }

        chips.forEach(chip => {
            chip.addEventListener('click', function() {
                totalBet += parseInt(this.dataset.value);
                balance -= parseInt(this.dataset.value);
                document.getElementById('balance').innerText = `Bank Balance: $${balance}`;
            });
        });

        document.getElementById('spinButton').addEventListener('click', spinWheel);
        
        drawWheel(); // Initial drawing of the wheel
    </script>
</body>
</html>
