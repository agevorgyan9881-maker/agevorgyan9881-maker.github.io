<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Wheel Game</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        #wheel {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            border: 16px solid #ccc;
            position: relative;
            overflow: hidden;
            transition: transform 4s cubic-bezier(0.33, 1, 0.68, 1);
        }
        .sector {
            position: absolute;
            width: 50%;
            height: 50%;
            border-radius: 100% 0 0 0;
            transform-origin: 100% 100%;
        }
        .sector:nth-child(1) { background-color: #FF5733; transform: rotate(0deg); }
        .sector:nth-child(2) { background-color: #33FF57; transform: rotate(45deg); }
        .sector:nth-child(3) { background-color: #3357FF; transform: rotate(90deg); }
        .sector:nth-child(4) { background-color: #F1C40F; transform: rotate(135deg); }
        .sector:nth-child(5) { background-color: #8E44AD; transform: rotate(180deg); }
        .sector:nth-child(6) { background-color: #E67E22; transform: rotate(225deg); }
        .sector:nth-child(7) { background-color: #2ECC71; transform: rotate(270deg); }
        .sector:nth-child(8) { background-color: #3498DB; transform: rotate(315deg); }
        #spinButton {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #2980B9;
            color: white;
            transition: background-color 0.3s;
        }
        #spinButton:hover {
            background-color: #1F6391;
        }
    </style>
</head>
<body>
    <div id="wheel">
        <div class="sector">Prize 1</div>
        <div class="sector">Prize 2</div>
        <div class="sector">Prize 3</div>
        <div class="sector">Prize 4</div>
        <div class="sector">Prize 5</div>
        <div class="sector">Prize 6</div>
        <div class="sector">Prize 7</div>
        <div class="sector">Prize 8</div>
    </div>
    <button id="spinButton">Spin</button>
    <script>
        const wheel = document.getElementById('wheel');
        const spinButton = document.getElementById('spinButton');

        spinButton.addEventListener('click', function() {
            const randomDegree = Math.floor(Math.random() * 360 + 720); // More than 2 full spins
            wheel.style.transform = `rotate(${randomDegree}deg)`;
        });
    </script>
</body>
</html>
