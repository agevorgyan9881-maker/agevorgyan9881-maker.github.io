<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Wheel Game</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f4f4f4;
            font-family: Arial, sans-serif;
        }
        #wheel {
            width: 300px;
            height: 300px;
            border: 16px solid #ffcc00;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            transition: transform 4s cubic-bezier(0.33, 1, 0.68, 1);
        }
        .sector {
            position: absolute;
            width: 50%;
            height: 50%;
            background-color: #ff5733;
            clip-path: polygon(100% 0, 0 100%, 100% 100%);
            transform-origin: 100% 100%;
        }
        .sector:nth-child(1) { transform: rotate(0deg); background-color: #ff5733; }
        .sector:nth-child(2) { transform: rotate(45deg); background-color: #33ff57; }
        .sector:nth-child(3) { transform: rotate(90deg); background-color: #3357ff; }
        .sector:nth-child(4) { transform: rotate(135deg); background-color: #ff33a1; }
        .sector:nth-child(5) { transform: rotate(180deg); background-color: #ffcc00; }
        .sector:nth-child(6) { transform: rotate(225deg); background-color: #33ffcc; }
        .sector:nth-child(7) { transform: rotate(270deg); background-color: #cc33ff; }
        .sector:nth-child(8) { transform: rotate(315deg); background-color: #ff3333; }
        #spinBtn {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #ffcc00;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
        }
        #result {
            margin-top: 20px;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div id="wheel">
        <div class="sector">Prize 1</div>
        <div class="sector">Prize 2</div>
        <div class="sector">Prize 3</div>
        <div class="sector">Prize 4</div>
        <div class="sector">Prize 5</div>
        <div class="sector">Prize 6</div>
        <div class="sector">Prize 7</div>
        <div class="sector">Prize 8</div>
    </div>
    <button id="spinBtn">Spin</button>
    <div id="result"></div>
    <script>
        const wheel = document.getElementById('wheel');
        const spinBtn = document.getElementById('spinBtn');
        const result = document.getElementById('result');
        const prizes = ['Prize 1', 'Prize 2', 'Prize 3', 'Prize 4', 'Prize 5', 'Prize 6', 'Prize 7', 'Prize 8'];
        
        spinBtn.addEventListener('click', () => {
            const rotation = Math.floor(5000 + Math.random() * 5000);
            wheel.style.transform = `rotate(${rotation}deg)`;
            const winningSector = Math.floor((rotation % 360) / 45);
            setTimeout(() => {
                result.textContent = `You won: ${prizes[winningSector]}`;
                result.style.fontWeight = 'bold';
            }, 4000);
        });
    </script>
</body>
</html>
