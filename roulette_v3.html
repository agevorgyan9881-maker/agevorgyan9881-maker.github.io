<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette Game</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #container {
            text-align: center;
        }
        .roulette-wheel {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d4af37, #3d5c3e);
            position: relative;
            margin: 0 auto;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            animation: spin 10s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #spin-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: gold;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
        }
        #spin-btn:hover {
            background: #ffcc00;
        }
        .popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
            z-index: 999;
        }
        .winner {
            color: #d4af37;
            font-size: 24px;
        }
        @keyframes confetti {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="container">
        <div class="roulette-wheel" id="roulette-wheel"></div>
        <button id="spin-btn">Spin the Wheel!</button>
        <div class="popup" id="winner-popup">
            <div class="winner">Congratulations! You Won!</div>
            <button id="close-popup">Close</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/canvas-confetti/1.4.0/confetti.browser.min.js"></script>
    <script>
        const spinButton = document.getElementById('spin-btn');
        const winnerPopup = document.getElementById('winner-popup');
        const closePopup = document.getElementById('close-popup');
        const wheel = document.getElementById('roulette-wheel');

        spinButton.addEventListener('click', function() {
            const spinSound = new Audio('https://www.soundjay.com/button/sounds/button-16.mp3');
            spinSound.play();
            const spinDuration = Math.floor(Math.random() * 3000) + 2000; // Random spin duration between 2-5 seconds
            wheel.style.transition = `transform ${spinDuration}ms ease-out`;
            const randomDegree = Math.floor(Math.random() * 360); // Random degree
            wheel.style.transform = `rotate(${randomDegree + 720}deg)`; // Add extra spins for effect

            setTimeout(() => {
                wheel.style.transition = 'none'; // Disable transition once it's done
                wheel.style.transform = `rotate(${randomDegree}deg)`; // Final position

                // Show winner popup
                showWinnerPopup();
            }, spinDuration);
        });

        function showWinnerPopup() {
            winnerPopup.style.display = 'block';
            confetti();
        }

        closePopup.addEventListener('click', function() {
            winnerPopup.style.display = 'none';
        });
    </script>
</body>
</html>
