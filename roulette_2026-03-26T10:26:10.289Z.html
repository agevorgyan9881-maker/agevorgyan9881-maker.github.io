<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette Game</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #232323;
            font-family: 'Arial', sans-serif;
            color: #fff;
        }
        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .wheel {
            width: 300px;
            height: 300px;
            border: 16px solid gold;
            border-radius: 50%;
            background: radial-gradient(circle, #005200 30%, #005700 60%);
            position: relative;
            overflow: hidden;
            animation: spinAnimation 5s infinite linear;
        }
        @keyframes spinAnimation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .spin-button {
            padding: 15px 40px;
            background: gold;
            border: none;
            border-radius: 25px;
            font-size: 1.5em;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }
        .spin-button:hover {
            background: #f5d03f;
        }
        .popup {
            display: none;
            position: fixed;
            left: 0;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .confetti {
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 1;
            position: absolute;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="wheel" id="rouletteWheel"></div>
        <button class="spin-button" id="spinButton">Spin!</button>
        <div class="popup" id="winnerPopup">
            <h2>You Win!</h2>
            <button onclick="closePopup()">Close</button>
        </div>
        <div class="confetti" id="confettiContainer"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/canvas-confetti/1.4.0/confetti.min.js"></script>
    <script>
        document.getElementById('spinButton').addEventListener('click', spinWheel);

        function spinWheel() {
            const wheel = document.getElementById('rouletteWheel');
            const randomDegree = Math.floor(Math.random() * 360 + 720); // 720 for at least 2 rotations
            wheel.style.transition = 'transform 5s ease-out';
            wheel.style.transform = 'rotate(' + randomDegree + 'deg)';

            const clickSound = new Audio('https://www.soundjay.com/button/click-1.mp3');
            clickSound.play();

            setTimeout(() => {
                showWinnerPopup();
                shootConfetti();
            }, 5000); // Show popup after spin ends
        }

        function showWinnerPopup() {
            const popup = document.getElementById('winnerPopup');
            popup.style.display = 'block';
        }

        function closePopup() {
            const popup = document.getElementById('winnerPopup');
            popup.style.display = 'none';
        }

        function shootConfetti() {
            const canvas = document.createElement('canvas');
            document.getElementById('confettiContainer').appendChild(canvas);
            const myConfetti = confetti.create(canvas, { useWorker: true });
            myConfetti({ particleCount: 200, spread: 60 });
            canvas.style.position = 'absolute';
            canvas.style.top = '0';
            canvas.style.left = '0';
            canvas.style.width = '100%';
            canvas.style.height = '100%';
            // Set the z-index so that the confetti is on top
            canvas.style.zIndex = '5';
        }
    </script>
</body>
</html>
